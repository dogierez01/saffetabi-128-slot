<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Lingua - Neon Slots</title>
    <style>

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #020205;
            background-image: 
                radial-gradient(circle at 50% 50%, #080a24 0%, #020205 100%),
                linear-gradient(0deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            font-family: 'Oswald', sans-serif;
            margin: 0;
            color: white;
            overflow-y: auto;
        }

        /* --- BOOT SEQUENCE SCREENS --- */
        #splash-screen, #instructions-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #020205;
            background-image: radial-gradient(circle at 50% 50%, #080a24 0%, #020205 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #splash-screen { cursor: pointer; }
        
        .main-logo-text {
            font-family: 'Teko', sans-serif;
            color: #fff;
            font-size: 120px;
            font-weight: 600;
            margin: 0;
            text-shadow: 0 0 15px #00f3ff, 0 0 30px #00f3ff, 0 0 60px #ff00e6;
            letter-spacing: 10px;
            animation: pulse 2s infinite;
        }

        .click-to-continue {
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            color: #00f3ff;
            margin-top: 30px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        #instructions-screen { display: none; }
        
        .instructions-image {
            max-width: 80%;
            max-height: 70vh;
            border: 4px solid #ff00e6;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(255, 0, 230, 0.4);
            margin-bottom: 40px;
        }

        #enter-academy-btn {
            background: rgba(0, 243, 255, 0.1); border: 2px solid #00f3ff; border-radius: 50px; color: #00f3ff;
            font-family: 'Teko', sans-serif; font-size: 42px; font-weight: 600; padding: 15px 100px;
            cursor: pointer; box-shadow: 0 0 30px rgba(0, 243, 255, 0.3), inset 0 0 15px rgba(0, 243, 255, 0.2); 
            text-transform: uppercase; letter-spacing: 4px; transition: 0.2s;
        }
        #enter-academy-btn:hover { background: rgba(0, 243, 255, 0.2); box-shadow: 0 0 50px rgba(0, 243, 255, 0.6); transform: scale(1.05); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- LOBBY STYLES (COMPACT) --- */
        #lobby-view {
            display: none; /* Hidden initially due to boot sequence */
            text-align: center;
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        .studio-title {
            font-family: 'Teko', sans-serif;
            color: #fff;
            font-size: 64px;
            font-weight: 600;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
            letter-spacing: 4px;
        }

        .studio-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .studio-card {
            background: linear-gradient(180deg, #111432 0%, #050612 100%);
            border: 2px solid #3d5afe;
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .studio-card:hover {
            transform: scale(1.05);
            border-color: #00f3ff;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        .studio-card h2 { font-family: 'Teko', sans-serif; color: #00f3ff; margin: 0; font-size: 28px; letter-spacing: 2px;}

        .completion-badge {
            display: none; margin-top: 8px; border-top: 1px solid #333;
            padding-top: 5px; font-size: 14px; font-family: 'Rajdhani', sans-serif; font-weight: bold;
        }
        .completion-badge.visible { display: block; }

        #reset-btn {
            background: transparent; color: #ff00e6; border: 1px solid #ff00e6;
            padding: 8px 20px; border-radius: 4px; cursor: pointer; margin-bottom: 20px;
            font-family: 'Rajdhani', sans-serif; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;
        }
        #reset-btn:hover { background: rgba(255, 0, 230, 0.1); box-shadow: 0 0 15px #ff00e6; }

        /* --- GAME STYLES --- */
        #game-view { display: none; width: 1250px; }

        #question-box {
            width: 100%;
            background: #050612;
            border: 3px solid #00f3ff;
            border-radius: 100px;
            padding: 70px 50px; /* Increased padding for larger text */
            margin-bottom: 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.2);
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* TEXT SIZES AND COLORS UPDATED HERE */
        #question-text { 
            font-size: 64px; /* MASSIVE FONT SIZE */
            font-weight: bold; 
            color: #ffffff; /* PURE WHITE */
            margin: 0; 
            line-height: 1.2; 
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        #options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            width: 100%;
        }

        .option-btn {
            background: #050612;
            border: 2px solid #3d5afe;
            border-radius: 50px;
            padding: 30px 40px;
            color: #ffffff;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            min-height: 150px;
        }

        .option-btn:hover:not(:disabled) { border-color: #00f3ff; background: rgba(0, 243, 255, 0.1); box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); }
        .option-label { color: #00f3ff; font-weight: bold; margin-right: 20px; font-family: 'Teko', sans-serif; font-size: 40px; }
        
        .option-text {
            font-size: 56px; /* MASSIVE FONT SIZE */
            color: #ffff00; /* BRIGHT YELLOW */
            font-weight: bold;
            line-height: 1.2;
            text-shadow: 0 0 15px rgba(255, 255, 0, 0.6);
        }

        .option-btn.selected { background: rgba(0, 243, 255, 0.2) !important; border-color: #00f3ff; }
        .option-btn.correct { background: #39FF14 !important; border-color: #fff; box-shadow: 0 0 30px rgba(57, 255, 20, 0.5); }
        .option-btn.correct .option-text, .option-btn.correct .option-label { color: #000; text-shadow: none; }
        
        .option-btn.wrong { background: #ff00e6 !important; border-color: #fff; box-shadow: 0 0 30px rgba(255, 0, 230, 0.5); }
        .option-btn.wrong .option-text, .option-btn.wrong .option-label { color: #fff; text-shadow: none; }

        #manual-next {
            display: none; margin-top: 30px; background: rgba(0, 243, 255, 0.1);
            border: 2px solid #00f3ff; color: #00f3ff; padding: 15px 60px;
            font-size: 32px; font-weight: bold; border-radius: 50px;
            cursor: pointer; font-family: 'Teko', sans-serif;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            text-transform: uppercase; letter-spacing: 2px;
        }

        #dashboard {
            display: flex; justify-content: center; gap: 40px;
            background: rgba(0, 0, 0, 0.8); border: 2px solid #3d5afe;
            border-radius: 16px; padding: 30px; margin-top: 50px;
        }

        .meter { text-align: center; min-width: 300px; }
        .meter-title { font-family: 'Rajdhani', sans-serif; font-size: 20px; color: #00f3ff; text-transform: uppercase; letter-spacing: 2px; }
        .meter-val { font-size: 80px; font-weight: bold; margin-top: 10px; font-family: 'Teko', sans-serif;}
        #timer-val { color: #ff00e6; text-shadow: 0 0 20px rgba(255, 0, 230, 0.6); }
        #score-val { color: #39FF14; text-shadow: 0 0 20px rgba(57, 255, 20, 0.5); }

        #back-btn {
            position: fixed; top: 20px; left: 20px;
            background: transparent; border: 1px solid #ff00e6; color: #ff00e6;
            padding: 8px 15px; border-radius: 5px; cursor: pointer; z-index: 100;
            font-family: 'Rajdhani', sans-serif; font-weight: bold; letter-spacing: 1px;
        }

        #custom-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #0b0914; border: 2px solid #ff00e6; border-radius: 20px;
            padding: 50px; text-align: center; max-width: 600px; box-shadow: 0 0 50px rgba(255, 0, 230, 0.3);
        }
        .modal-btn {
            background: transparent; color: #00f3ff; border: 2px solid #00f3ff;
            padding: 15px 50px; font-size: 32px; cursor: pointer; border-radius: 10px; margin-top: 30px; font-family: 'Teko', sans-serif;
            text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="splash-screen" onclick="showInstructions()">

    </div>

    <div id="instructions-screen">

        <button id="enter-academy-btn" onclick="enterLobby()">ENTER THE GRID</button>
    </div>

    <button id="back-btn" onclick="returnToLobby()" style="display: none;">◀ ABORT</button>

    <div id="lobby-view">

        <button id="reset-btn" onclick="resetProgress()">CLEAR DATA</button>
        <div class="studio-grid" id="studio-grid">

    </div>

    <div id="game-view">

                <button class="option-btn" id="opt-B" onclick="handleChoice('B')"><span class="option-label">B:</span> <span class="option-text" id="text-B"></span></button>
            </div>
            <button id="manual-next" onclick="skipDelay()">BYPASS DELAY ⮕</button>
            <div id="dashboard">

            </div>
        </div>
    </div>

    <div id="custom-modal">

            <button id="modal-btn" class="modal-btn" onclick="modalAction()"></button>
        </div>
    </div>

            { tr: "Ekonomi bir kısır döngü.", a: "The Turkish economy is a blind circle.", b: "The Turkish economy is a vicious circle.", ans: "B" },

            { tr: "Çay veya kahve, aynı hesap.", a: "Tea or coffee, same difference.", b: "Tea or coffee, same distinction.", ans: "A" },
            { tr: "Kırk yılda bir konuşuruz.", a: "We talk once in a time.", b: "We talk once in a while.", ans: "B" },
            { tr: "Sözüm ona patron o.", a: "So to tell, he is the boss.", b: "So to say, he is the boss.", ans: "B" },
            { tr: "Benzer şekilde katılıyorum.", a: "Familiarly, I agree.", b: "Similarly, I agree.", ans: "B" }
        ];

        let currentShuffledSet = [], retryPool = [], currentIdx = 0, score = 0, corrects = 0, totalAtts = 0, phase = 1, gameId = "";
        let countdown, timerVal = 10, nextTaskTimeout = null;

        const STORAGE_KEY = "cyberSlotsProgress";

        function createLobby() {
            const grid = document.getElementById('studio-grid');
            if (!grid) return;
            grid.innerHTML = ''; 
            for(let i=1; i<=8; i++) {
                grid.innerHTML += `
                    <div class="studio-card" onclick="startStudio('g${i}')">
                        <h2>NODE 0${i}</h2>
                        <div id="badge-g${i}" class="completion-badge">
                            <span style="color:#00f3ff">ACCURACY: <span id="percent-g${i}">0</span>%</span><br>
                            <span style="color:#ffe600">CREDITS: <span id="score-g${i}">0</span></span>
                        </div>
                    </div>
                `;
            }
            updateLobby();
        }

        function updateLobby() {
            const progress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            for(let i=1; i<=8; i++) {
                const id = 'g'+i;
                const badge = document.getElementById('badge-'+id);
                if(progress[id] && badge) {
                    badge.classList.add('visible');
                    document.getElementById('score-'+id).innerText = progress[id].score;
                    document.getElementById('percent-'+id).innerText = progress[id].percent;
                }
            }
        }

        function startStudio(id) {
            gameId = id;
            const studioNum = parseInt(id.slice(1));
            const start = (studioNum - 1) * 16;
            const originalSet = rawData.slice(start, start + 16);
            
            currentShuffledSet = [...originalSet].sort(() => Math.random() - 0.5);
            
            retryPool = []; currentIdx = 0; score = 0; corrects = 0; totalAtts = 0; phase = 1;
            
            document.getElementById('lobby-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';
            
            document.getElementById('score-val').innerText = "0";
            document.getElementById('success-val').innerText = "0%";
            document.getElementById('timer-val').innerText = "10";
            
            renderQuestion();
        }

        function renderQuestion() {
            const pool = phase === 1 ? currentShuffledSet : retryPool;
            if(currentIdx >= pool.length) {
                if(phase === 1 && retryPool.length > 0) {
                    showModal("LIFELINE PROTOCOL", "Main sequence complete. Initiating decryption for failed protocols. No credits awarded.", "PROCEED");
                    return;
                } else if (phase === 2 && retryPool.length > 0) {
                    currentIdx = 0; renderQuestion(); return;
                } else { finishGame(); return; }
            }

            const q = pool[currentIdx];
            document.getElementById('question-text').innerText = q.tr;
            document.getElementById('text-A').innerText = q.a;
            document.getElementById('text-B').innerText = q.b;
            document.getElementById('manual-next').style.display = 'none';
            
            resetButtons();
            startTimer();
        }

        function resetButtons() {
            ['A','B'].forEach(l => {
                const b = document.getElementById('opt-'+l);
                b.className = 'option-btn'; b.disabled = false;
            });
        }

        function startTimer() {
            clearInterval(countdown); timerVal = 10;
            document.getElementById('timer-val').innerText = timerVal;
            countdown = setInterval(() => {
                timerVal--; document.getElementById('timer-val').innerText = timerVal;
                if(timerVal <= 0) clearInterval(countdown);
            }, 1000);
        }

        function handleChoice(choice) {
            clearInterval(countdown);
            const pool = phase === 1 ? currentShuffledSet : retryPool;
            const q = pool[currentIdx];
            const btn = document.getElementById('opt-'+choice);
            const correctBtn = document.getElementById('opt-'+q.ans);
            const isCorrect = (choice === q.ans);

            btn.classList.add('selected');
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            document.getElementById('manual-next').style.display = 'block';

            setTimeout(() => {
                let delay = 2000;
                if(isCorrect) {
                    btn.classList.add('correct');
                    if(phase === 1) { 
                        score += (100 + timerVal); 
                        corrects++; 
                    }
                } else {
                    delay = 6000; btn.classList.add('wrong'); correctBtn.classList.add('correct');
                    if(phase === 1) retryPool.push(q);
                }

                if(phase === 1) {
                    totalAtts++;
                    document.getElementById('score-val').innerText = score;
                    document.getElementById('success-val').innerText = Math.round((corrects/totalAtts)*100) + "%";
                }

                nextTaskTimeout = setTimeout(moveToNext, delay);
            }, 600);
        }

        function skipDelay() { if(nextTaskTimeout) { clearTimeout(nextTaskTimeout); moveToNext(); } }

        function moveToNext() {
            if(phase === 2) {
                const selectedCorrectBtn = document.querySelector('.option-btn.selected.correct');
                if(selectedCorrectBtn) {
                    retryPool.splice(currentIdx, 1);
                } else {
                    currentIdx++;
                }
            } else {
                currentIdx++;
            }
            renderQuestion();
        }

        function showModal(title, msg, btnText) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('modal-btn').innerText = btnText;
            document.getElementById('custom-modal').style.display = 'flex';
        }

        function modalAction() {
            document.getElementById('custom-modal').style.display = 'none';
            phase = 2; currentIdx = 0; renderQuestion();
        }

        function finishGame() {
            const perc = Math.round((corrects/totalAtts)*100);
            let progress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            progress[gameId] = { score, percent: perc };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
            document.getElementById('question-text').innerHTML = "<span style='color:#39FF14'>NODE SECURED</span>";
            document.getElementById('options-container').style.display = 'none';
            document.getElementById('manual-next').style.display = 'none';
            setTimeout(returnToLobby, 3000);
        }

        function returnToLobby() {
            clearInterval(countdown);
            document.getElementById('lobby-view').style.display = 'block';
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('options-container').style.display = 'grid';
            updateLobby();
        }

        function resetProgress() { if(confirm("Tüm sistem verilerini silmek istediğine emin misin?")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }

        // Start initialization if not in boot sequence
        // We let the user click through the boot sequence first.
    </script>
