<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>Cyber Lingua - Neon Slots</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Teko:wght@400;600&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #020205;
            background-image: 
                radial-gradient(circle at 50% 50%, #080a24 0%, #020205 100%),
                linear-gradient(0deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            color: white;
            overflow-y: auto;
            box-sizing: border-box;
        }

        /* --- BOOT SEQUENCE SCREENS --- */
        #splash-screen, #instructions-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #020205;
            background-image: radial-gradient(circle at 50% 50%, #080a24 0%, #020205 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        #splash-screen { cursor: pointer; }
        
        .main-logo-img {
            max-width: 90%;
            max-height: 40vh;
            animation: pulse 2s infinite;
            filter: drop-shadow(0 0 15px rgba(0, 243, 255, 0.5));
        }

        .main-logo-text {
            font-family: 'Teko', sans-serif;
            color: #fff;
            font-size: 120px;
            font-weight: 600;
            margin: 0;
            text-shadow: 0 0 15px #00f3ff, 0 0 30px #00f3ff, 0 0 60px #ff00e6;
            letter-spacing: 10px;
            animation: pulse 2s infinite;
            display: none; 
        }

        .click-to-continue {
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            color: #00f3ff;
            margin-top: 30px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        #instructions-screen { display: none; }
        
        .instructions-image {
            max-width: 95%;
            max-height: 60vh;
            border: 3px solid #ff00e6;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 0, 230, 0.4);
            margin-bottom: 20px;
        }

        #enter-academy-btn {
            background: rgba(0, 243, 255, 0.1); border: 2px solid #00f3ff; border-radius: 50px; color: #00f3ff;
            font-family: 'Teko', sans-serif; font-size: 36px; font-weight: 600; padding: 10px 40px;
            cursor: pointer; box-shadow: 0 0 20px rgba(0, 243, 255, 0.3), inset 0 0 10px rgba(0, 243, 255, 0.2); 
            text-transform: uppercase; letter-spacing: 4px; transition: 0.2s; width: 90%; max-width: 400px;
        }
        #enter-academy-btn:hover { background: rgba(0, 243, 255, 0.2); box-shadow: 0 0 40px rgba(0, 243, 255, 0.6); transform: scale(1.05); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- LOBBY STYLES --- */
        #lobby-view {
            display: none;
            text-align: center;
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            box-sizing: border-box;
        }

        .arcade-title {
            font-family: 'Teko', sans-serif;
            color: #fff;
            font-size: 64px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
            letter-spacing: 4px;
        }

        /* DATA CORE SELECTOR */
        .core-selector {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .core-btn {
            background: rgba(11, 9, 20, 0.8); border: 2px solid #3d5afe; color: #3d5afe;
            padding: 8px 30px; font-family: 'Teko', sans-serif; font-size: 28px;
            border-radius: 8px; cursor: pointer; letter-spacing: 2px; transition: 0.2s;
        }
        .core-btn.active {
            background: rgba(0, 243, 255, 0.15); border-color: #00f3ff; color: #00f3ff;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }

        .lobby-controls { margin-bottom: 30px; }

        #reset-btn {
            background: transparent; color: #ff00e6; border: 1px solid #ff00e6;
            padding: 8px 20px; border-radius: 4px; cursor: pointer;
            font-family: 'Rajdhani', sans-serif; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;
            box-shadow: inset 0 0 10px rgba(255, 0, 230, 0.2);
        }

        .studio-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 15px; 
        }

        .studio-card {
            background: linear-gradient(180deg, #111432 0%, #050612 100%);
            border: 2px solid #3d5afe;
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .studio-card:hover { transform: scale(1.05); border-color: #00f3ff; box-shadow: 0 0 20px rgba(0, 243, 255, 0.4); }
        .studio-card h2 { font-family: 'Teko', sans-serif; color: #00f3ff; margin: 0; font-size: 28px; letter-spacing: 2px;}

        .completion-badge {
            display: none; margin-top: 8px; border-top: 1px solid #333;
            padding-top: 5px; font-size: 14px; font-weight: bold;
        }
        .completion-badge.visible { display: block; }

        /* --- GAME STYLES --- */
        #game-view { 
            display: none; 
            width: 100%; 
            max-width: 1200px; 
            padding: 10px; 
            box-sizing: border-box; 
        }

        #machine-casing {
            background: rgba(11, 9, 20, 0.95);
            border: 3px solid #00f3ff; border-radius: 16px; 
            padding: 30px; 
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2), inset 0 0 20px rgba(255, 0, 230, 0.1);
            position: relative;
        }

        #header { 
            display: flex; justify-content: center; align-items: center; 
            margin-bottom: 20px; position: relative; width: 100%;
        }
        
        #back-btn-game {
            position: absolute; left: 0;
            background: transparent; border: 1px solid #ff00e6; color: #ff00e6;
            padding: 8px 16px; border-radius: 4px; cursor: pointer;
            font-size: 14px; font-weight: bold; text-transform: uppercase;
            box-shadow: inset 0 0 10px rgba(255, 0, 230, 0.2); transition: 0.2s;
        }
        
        #game-title { font-family: 'Teko', sans-serif; font-size: 48px; letter-spacing: 6px; text-shadow: 0 0 15px #00f3ff; margin: 0; }

        /* THE REEL WINDOW */
        #reel-window {
            background: #030205; border: 2px solid #ff00e6; border-radius: 8px;
            height: 380px; 
            position: relative; overflow: hidden; margin-bottom: 20px;
            box-shadow: inset 0 0 40px rgba(255, 0, 230, 0.15);
        }

        #reel-strip { position: absolute; top: 0; left: 0; width: 100%; display: flex; flex-direction: column; }

        .sentence-item {
            height: 380px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 15px 40px; box-sizing: border-box; text-align: center;
        }

        .turkish-text { 
            color: #ffffff; font-size: 52px; font-weight: bold; line-height: 1.2; margin: 0; 
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); 
        }
        .english-text { 
            color: #ffff00; font-size: 48px; margin-top: 15px; font-weight: bold; 
            display: none; line-height: 1.2; text-shadow: 0 0 15px rgba(255, 255, 0, 0.8); 
        }

        /* FLEX WRAP DASHBOARD */
        #meters { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; 
            background: rgba(0, 0, 0, 0.6); border: 1px solid #00f3ff; 
            border-radius: 8px; padding: 15px; margin-bottom: 20px; 
        }
        .meter { text-align: center; flex: 1 1 200px; min-width: 150px; }
        .meter-title { font-size: 16px; color: #00f3ff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2px; }
        .meter-val { font-size: 48px; font-weight: bold; font-family: 'Teko', sans-serif; line-height: 1; }
        #score-val { color: #ffe600; }
        #success-val { color: #00f3ff; }
        #timer-val { color: #ff00e6; }

        /* ACTION PANEL */
        #action-panel { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; align-items: center; 
            padding: 15px; background: rgba(0,0,0,0.5); border-radius: 12px; 
            border: 1px solid rgba(255, 0, 230, 0.3); margin-bottom: 10px;
        }

        .action-btn { 
            background: transparent; border-radius: 8px; font-size: 22px; 
            padding: 12px 30px; cursor: pointer; font-weight: bold; 
            display: none; text-transform: uppercase; letter-spacing: 1px; transition: 0.1s; 
            flex: 1 1 250px; 
            text-align: center;
        }
        .action-btn:active { transform: scale(0.95); }
        
        #btn-hint { color: #00f3ff; border: 2px solid #00f3ff; display: block;}
        #btn-tick { color: #39FF14; border: 2px solid #39FF14; }
        #btn-cross { color: #ff1744; border: 2px solid #ff1744; }

        #controls { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px; min-height: 80px; }

        #spin-btn {
            background: rgba(0, 243, 255, 0.1); border: 2px solid #00f3ff; border-radius: 8px; color: #00f3ff;
            font-family: 'Teko', sans-serif; font-size: 42px; font-weight: 600; padding: 10px 60px;
            cursor: pointer; box-shadow: 0 0 20px rgba(0, 243, 255, 0.3); 
            text-transform: uppercase; letter-spacing: 4px; transition: 0.2s; width: 100%; max-width: 400px;
        }
        #spin-btn:disabled { display: none; }

        #finish-btn { 
            display: none; background: rgba(255, 230, 0, 0.1); border: 2px solid #ffe600; 
            border-radius: 8px; color: #ffe600; font-family: 'Teko', sans-serif; font-size: 42px; 
            padding: 10px 60px; text-transform: uppercase; cursor: pointer; width: 100%; max-width: 400px;
        }

        #custom-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px);
            padding: 20px; box-sizing: border-box;
        }
        .modal-content {
            background: #0b0914; border: 2px solid #ff00e6; border-radius: 16px; padding: 40px 20px; text-align: center; width: 100%; max-width: 500px;
        }
        .modal-content p { color: #fff; font-size: 20px; margin-bottom: 30px; }
        .modal-btn {
            background: transparent; color: #00f3ff; border: 2px solid #00f3ff; padding: 10px 30px; font-size: 24px; font-family: 'Teko', sans-serif; border-radius: 6px; cursor: pointer;
        }

        /* --- MOBILE RESPONSIVE QUERIES --- */
        @media (max-width: 768px) {
            .main-logo-text { font-size: 64px; }
            .arcade-title { font-size: 42px; }
            #game-title { font-size: 32px; }
            
            #machine-casing { padding: 15px; }
            #header { margin-bottom: 15px; }
            #back-btn-game { position: relative; transform: none; margin-bottom: 10px; font-size: 12px; }
            
            /* Shrink slot window for mobile */
            #reel-window { height: 280px; }
            .sentence-item { height: 280px; padding: 10px; }
            
            .turkish-text { font-size: 32px; }
            .english-text { font-size: 28px; }
            
            .meter-val { font-size: 36px; }
            .action-btn { font-size: 18px; padding: 10px 20px; }
            
            #modal-title { font-size: 42px !important; }
            .core-btn { font-size: 20px; padding: 6px 15px; }
        }
    </style>
</head>
<body>

    <div id="splash-screen" onclick="showInstructions()">
        <img src="logo.png" alt="Cyber Lingua Logo" class="main-logo-img" onerror="this.style.display='none'; document.getElementById('fallback-logo-text').style.display='block';">
        <h1 id="fallback-logo-text" class="main-logo-text">CYBER LINGUA</h1>
        <div class="click-to-continue">SYSTEM READY // TAP TO INITIATE</div>
    </div>

    <div id="instructions-screen">
        <img src="instructions.png" alt="Mission Briefing" class="instructions-image" onerror="this.src='https://via.placeholder.com/800x400.png?text=Mission+Briefing+[instructions.png+missing]'">
        <button id="enter-academy-btn" onclick="enterLobby()">ENTER GRID</button>
    </div>

    <div id="lobby-view">
        <h1 class="arcade-title">NEON TERMINALS</h1>
        
        <div class="core-selector">
            <button id="core-alpha-btn" class="core-btn active" onclick="switchCore('alpha')">[ CORE: ALPHA ]</button>
            <button id="core-beta-btn" class="core-btn" onclick="switchCore('beta')">[ CORE: BETA ]</button>
        </div>

        <div class="lobby-controls"><button id="reset-btn" onclick="resetProgress()">CLEAR CORE DATA</button></div>
        <div class="studio-grid" id="studio-grid">
            </div>
    </div>

    <div id="game-view">
        <div id="machine-casing">
            <div id="header">
                <button id="back-btn-game" onclick="returnToLobby()">◀ ABORT</button>
                <h1 id="game-title">NEON SLOTS</h1>
            </div>
            
            <div id="reel-window"><div id="reel-strip"></div></div>
            
            <div id="meters">
                <div class="meter"><div class="meter-title">CREDITS</div><div class="meter-val" id="score-val">0</div></div>
                <div class="meter"><div class="meter-title">ACCURACY</div><div class="meter-val" id="success-val">0%</div></div>
                <div class="meter"><div class="meter-title">TIME</div><div class="meter-val" id="timer-val">10</div></div>
            </div>

            <div id="action-panel" style="display:none;">
                <button id="btn-tick" class="action-btn" onclick="handleAnswer(true)">✅ HACKED</button>
                <button id="btn-hint" class="action-btn" onclick="showHint()">DECRYPT</button>
                <button id="btn-cross" class="action-btn" onclick="handleAnswer(false)">❌ FAILED</button>
            </div>
            
            <div id="controls">
                <button id="spin-btn" onclick="spinMachine()">INITIATE SPIN</button>
                <button id="finish-btn" onclick="returnToLobby()">SAVE & EXIT</button>
            </div>
        </div>
    </div>

    <div id="custom-modal">
        <div class="modal-content">
            <h1 id="modal-title" style="color:#ff00e6; font-family:'Teko'; font-size: 56px; margin:0 0 15px 0;">LIFELINE PROTOCOL</h1>
            <p id="modal-msg"></p>
            <button id="modal-btn" class="modal-btn" onclick="modalAction()"></button>
        </div>
    </div>

    <script>

            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('instructions-screen').style.display = 'flex';
        }

        function enterLobby() {
            document.getElementById('instructions-screen').style.display = 'none';
            document.getElementById('lobby-view').style.display = 'block';
            createLobby();
        }

        // State variables
        let activeCore = 'alpha'; 
        let currentShuffledSet = [], retryPool = [], currentIdx = 0, score = 0, corrects = 0, totalAtts = 0, phase = 1, gameId = "";
        let isSpinning = false, countdown, timerVal = 10;
        
        function getReelHeight() {
            return window.innerWidth <= 768 ? 280 : 380;
        }

        // Generate dynamic storage keys based on the active core
        function getStorageKey() {
            return "cyberSlotStats_" + activeCore;
        }

        // Switch between Alpha and Beta cores
        function switchCore(coreName) {
            activeCore = coreName;
            
            // Update Toggle UI
            document.getElementById('core-alpha-btn').classList.remove('active');
            document.getElementById('core-beta-btn').classList.remove('active');
            document.getElementById('core-' + coreName + '-btn').classList.add('active');
            
            // Refresh the lobby to show the scores for the newly selected core
            updateLobby();
        }

        function createLobby() {
            const grid = document.getElementById('studio-grid');
            if (!grid) return;
            grid.innerHTML = ''; 
            for(let i=1; i<=8; i++) {
                grid.innerHTML += `
                    <div class="studio-card" onclick="startStudio('g${i}')">
                        <h2>NODE 0${i}</h2>
                        <div id="badge-g${i}" class="completion-badge">
                            <span style="color:#00f3ff">ACCURACY: <span id="percent-g${i}">0</span>%</span><br>
                            <span style="color:#ffe600">CREDITS: <span id="score-g${i}">0</span></span>
                        </div>
                    </div>
                `;
            }
            updateLobby();
        }

        function updateLobby() {
            const progress = JSON.parse(localStorage.getItem(getStorageKey())) || {};
            for(let i=1; i<=8; i++) {
                const id = 'g'+i;
                const badge = document.getElementById('badge-'+id);
                if(badge) {
                    if(progress[id]) {
                        badge.classList.add('visible');
                        document.getElementById('score-'+id).innerText = progress[id].score;
                        document.getElementById('percent-'+id).innerText = progress[id].percent;
                    } else {
                        badge.classList.remove('visible');
                    }
                }
            }
        }

        function startStudio(id) {
            gameId = id;
            const studioNum = parseInt(id.slice(1));
            const start = (studioNum - 1) * 16;
            const originalSet = database[activeCore].slice(start, start + 16);
            
            currentShuffledSet = [...originalSet].sort(() => Math.random() - 0.5);
            
            retryPool = []; currentIdx = 0; score = 0; corrects = 0; totalAtts = 0; phase = 1;
            
            document.getElementById('lobby-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            
            document.getElementById('score-val').innerText = "0";
            document.getElementById('success-val').innerText = "0%";
            document.getElementById('timer-val').innerText = "10";
            
            document.getElementById('spin-btn').style.display = 'block';
            document.getElementById('spin-btn').disabled = false;
            document.getElementById('finish-btn').style.display = 'none';
            document.getElementById('action-panel').style.display = 'none';
            
            const reelStrip = document.getElementById('reel-strip');
            reelStrip.innerHTML = `<div class="sentence-item"><span class="turkish-text" style="color:#00f3ff">SYSTEM READY.<br>INITIATE SPIN.</span></div>`;
            reelStrip.style.transform = `translateY(0px)`;
        }

        function spinMachine() {
            if (isSpinning) return;
            const pool = phase === 1 ? currentShuffledSet : retryPool;
            
            if (currentIdx >= pool.length) {
                if (phase === 1 && retryPool.length > 0) {
                    showModal("CORRUPTION DETECTED", "Main sequence complete. Initiating decryption for failed protocols. No credits awarded.", "PROCEED");
                    return;
                } else if (phase === 2 && retryPool.length > 0) {
                    currentIdx = 0; 
                    spinMachine();
                    return;
                } else {
                    finishGame();
                    return;
                }
            }

            isSpinning = true;
            document.getElementById('spin-btn').style.display = 'none';
            document.getElementById('action-panel').style.display = 'none';
            clearInterval(countdown);

            const targetData = pool[currentIdx];
            const totalItemsInSpin = 20; 
            const reelStrip = document.getElementById('reel-strip');
            
            reelStrip.innerHTML = ''; 
            reelStrip.style.transition = 'none'; 
            reelStrip.style.transform = `translateY(0px)`;

            for (let i = 0; i < totalItemsInSpin; i++) {
                const div = document.createElement('div'); div.className = 'sentence-item';
                if (i === totalItemsInSpin - 1) { 
                    div.innerHTML = `<span class="turkish-text">${targetData.tr}</span><span class="english-text" id="active-english">${targetData.en}</span>`; 
                } else { 
                    const randomPhrase = pool[Math.floor(Math.random() * pool.length)].tr;
                    div.innerHTML = `<span class="turkish-text">${randomPhrase}</span>`; 
                }
                reelStrip.appendChild(div);
            }
            
            void reelStrip.offsetWidth; 
            reelStrip.style.transition = 'transform 2.0s cubic-bezier(0.1, 0.1, 0.1, 1), filter 2.0s ease-out';
            reelStrip.style.filter = 'blur(4px)'; 
            reelStrip.style.transform = `translateY(${-(totalItemsInSpin - 1) * getReelHeight()}px)`;
            
            setTimeout(() => { reelStrip.style.filter = 'blur(0px)'; }, 1500);
            setTimeout(() => { isSpinning = false; startActionPhase(); }, 2000); 
        }

        function startActionPhase() {
            document.getElementById('action-panel').style.display = 'flex';
            document.getElementById('btn-hint').style.display = 'block';
            document.getElementById('btn-tick').style.display = 'none';
            document.getElementById('btn-cross').style.display = 'none';
            
            timerVal = 10; 
            document.getElementById('timer-val').innerText = timerVal;
            clearInterval(countdown);
            countdown = setInterval(() => { 
                timerVal--; 
                document.getElementById('timer-val').innerText = timerVal; 
                if (timerVal <= 0) clearInterval(countdown); 
            }, 1000);
        }

        function showHint() {
            clearInterval(countdown); 
            document.getElementById('active-english').style.display = 'block';
            document.getElementById('btn-hint').style.display = 'none';
            document.getElementById('btn-tick').style.display = 'block';
            document.getElementById('btn-cross').style.display = 'block';
        }

        function handleAnswer(isSuccess) {
            const pool = phase === 1 ? currentShuffledSet : retryPool;
            const answeredItem = pool[currentIdx];
            
            document.getElementById('action-panel').style.display = 'none';

            if (phase === 1) {
                totalAtts++;
                if (isSuccess) { 
                    score += (100 + timerVal); 
                    corrects++; 
                } else { 
                    retryPool.push(answeredItem); 
                }
                document.getElementById('score-val').innerText = score; 
                document.getElementById('success-val').innerText = Math.round((corrects / totalAtts) * 100) + "%";
            } 
            
            if (phase === 2 && isSuccess) {
                retryPool.splice(currentIdx, 1);
            } else if (phase === 2 && !isSuccess) {
                currentIdx++;
            } else if (phase === 1) {
                currentIdx++;
            }

            setTimeout(() => { spinMachine(); }, 400); 
        }

        function showModal(title, msg, btnText) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('modal-btn').innerText = btnText;
            document.getElementById('custom-modal').style.display = 'flex';
        }

        function modalAction() {
            document.getElementById('custom-modal').style.display = 'none';
            phase = 2; currentIdx = 0; spinMachine();
        }

        function finishGame() {
            const perc = totalAtts > 0 ? Math.round((corrects/totalAtts)*100) : 0;
            let progress = JSON.parse(localStorage.getItem(getStorageKey())) || {};
            progress[gameId] = { score, percent: perc };
            localStorage.setItem(getStorageKey(), JSON.stringify(progress));
            
            const reelStrip = document.getElementById('reel-strip');
            reelStrip.innerHTML = `<div class="sentence-item"><span class="turkish-text" style="color:#39FF14">NODE SECURED.<br>ALL THREATS ELIMINATED.</span></div>`;
            document.getElementById('spin-btn').style.display = 'none';
            document.getElementById('finish-btn').style.display = 'block';
        }

        function returnToLobby() {
            clearInterval(countdown);
            document.getElementById('lobby-view').style.display = 'block';
            document.getElementById('game-view').style.display = 'none';
            updateLobby();
        }

        function resetProgress() { 
            if(confirm("Bu veritabanına ait tüm skorları silmek istediğine emin misin?")) { 
                localStorage.removeItem(getStorageKey()); 
                updateLobby(); 
            } 
        }

    </script>
</body>
</html>
